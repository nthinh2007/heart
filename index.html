<!DOCTYPE html>
<html lang="vi"><head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Valentine</title>
<style>*{margin:0;padding:0;box-sizing:border-box;}body{background:#000;height:100vh;overflow:hidden;}canvas{position:fixed;top:0;left:0;cursor:crosshair;}</style>
</head><body>
<canvas id="c"></canvas>
<script>(function(){
var cfg={"heartScale":0.32,"density":4.6,"sizeMin":3,"sizeMax":5.4,"mouseForce":16,"mouseRadius":105,"particleLight":"#ff2222","particleDark":"#440000","textColor":"#ffffff","fontSize":32,"trail":1,"text":"vợ oiiii anhh yeuu emm lamm vậy nên hãy đồng hành cùng nhau đến đám cưới nhaa ạaa"};
var canvas=document.getElementById('c');
var ctx=canvas.getContext('2d');
var W,H,particles=[],mouse={x:-9999,y:-9999},clickX=0,clickY=0,doClick=false;
var textLines=[],textFontPx=cfg.fontSize;
function h2a(h){return[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];}
function h2o(h){var a=h2a(h);return{r:a[0],g:a[1],b:a[2]};}
function lerp(a,b,t){return[Math.round(a[0]+(b[0]-a[0])*t),Math.round(a[1]+(b[1]-a[1])*t),Math.round(a[2]+(b[2]-a[2])*t)];}
function inHeart(px,py,cx,cy,s){var x=(px-cx)/s,y=-(py-cy)/s;return Math.pow(x*x+y*y-1,3)-x*x*y*y*y<=0;}
function heartHW(ny,scale){var lo=0,hi=1.5;for(var i=0;i<32;i++){var m=(lo+hi)/2;if(Math.pow(m*m+ny*ny-1,3)-m*m*ny*ny*ny<=0)lo=m;else hi=m;}return lo*scale;}
function buildLines(){
  textLines=[];if(!cfg.text||!cfg.text.trim())return;
  var scale=Math.min(W,H)*cfg.heartScale,cx=W/2,cy=H/2,fs=cfg.fontSize,lineH,lines;
  while(fs>=8){
    ctx.font='bold '+fs+'px sans-serif';lineH=fs*1.35;
    var maxW=heartHW(0,scale)*2,words=cfg.text.split(/\s+/).filter(Boolean),cur='';
    lines=[];
    for(var i=0;i<words.length;i++){var test=cur?cur+' '+words[i]:words[i];if(ctx.measureText(test).width<=maxW){cur=test;}else{if(cur)lines.push(cur);cur=words[i];}}
    if(cur)lines.push(cur);
    if(lines.length*lineH<=scale*1.4)break;
    fs--;
  }
  textFontPx=fs;var lh=fs*1.35,totalH=lines.length*lh,startY=cy-totalH/2+lh*0.75;
  textLines=lines.map(function(line,i){return{text:line,x:cx,y:startY+i*lh};});
}
function drawText(){
  if(!textLines.length||mouse.x===-9999)return;
  var col=cfg.textColor,rgb=h2o(col);
  var innerR=cfg.mouseRadius*0.50;
  var off=document.createElement('canvas');off.width=W;off.height=H;
  var octx=off.getContext('2d');
  octx.font='bold '+textFontPx+'px sans-serif';octx.textAlign='center';octx.textBaseline='middle';
  octx.shadowColor=col;octx.shadowBlur=10;
  octx.fillStyle='rgba('+rgb.r+','+rgb.g+','+rgb.b+',0.95)';
  for(var i=0;i<textLines.length;i++)octx.fillText(textLines[i].text,textLines[i].x,textLines[i].y);
  ctx.save();ctx.beginPath();ctx.arc(mouse.x,mouse.y,innerR,0,Math.PI*2);ctx.clip();
  ctx.drawImage(off,0,0);ctx.restore();
}
function build(){
  particles=[];var cx=W/2,cy=H/2,scale=Math.min(W,H)*cfg.heartScale,step=cfg.density;
  var cL=h2a(cfg.particleLight),cD=h2a(cfg.particleDark);
  for(var py=cy-scale*1.3;py<cy+scale*1.3;py+=step){
    for(var px=cx-scale*1.3;px<cx+scale*1.3;px+=step){
      if(!inHeart(px,py,cx,cy,scale))continue;
      var jx=(Math.random()-0.5)*step*0.8,jy=(Math.random()-0.5)*step*0.8,tx=px+jx,ty=py+jy;
      var a=Math.random()*Math.PI*2,d=(Math.random()*0.5+0.5)*Math.max(W,H)*0.6,t=Math.random(),col=lerp(cD,cL,t);
      particles.push({x:cx+Math.cos(a)*d,y:cy+Math.sin(a)*d,tx,ty,vx:0,vy:0,size:Math.random()*(cfg.sizeMax-cfg.sizeMin)+cfg.sizeMin,alpha:0,targetAlpha:Math.random()*0.4+0.6,r:col[0],g:col[1],b:col[2],delay:Math.random()*60});
    }
  }
  buildLines();
}
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;canvas.style.width=W+'px';canvas.style.height=H+'px';build();}
var frame=0;
function loop(){
  frame++;ctx.fillStyle='rgba(0,0,0,'+cfg.trail+')';ctx.fillRect(0,0,W,H);
  var mR=cfg.mouseRadius,mF=cfg.mouseForce;
  for(var i=0;i<particles.length;i++){
    var p=particles[i];if(p.delay>0){p.delay--;continue;}
    p.vx+=(p.tx-p.x)*0.07;p.vy+=(p.ty-p.y)*0.07;
    var mdx=p.x-mouse.x,mdy=p.y-mouse.y,md=Math.sqrt(mdx*mdx+mdy*mdy);
    if(md<mR){var f=(mR-md)/mR;p.vx+=mdx/(md+1)*f*mF;p.vy+=mdy/(md+1)*f*mF;}
    if(doClick){var cdx=p.x-clickX,cdy=p.y-clickY,cd=Math.sqrt(cdx*cdx+cdy*cdy)+1,ff=Math.min(400/cd,18);p.vx+=cdx/cd*ff;p.vy+=cdy/cd*ff;}
    p.vx*=0.86;p.vy*=0.86;p.x+=p.vx;p.y+=p.vy;
    if(p.alpha<p.targetAlpha)p.alpha=Math.min(p.alpha+0.025,p.targetAlpha);
    var s=p.size*(1+Math.sin(frame*0.04+p.tx*0.005)*0.08);
    ctx.beginPath();ctx.arc(p.x,p.y,s,0,Math.PI*2);
    ctx.fillStyle='rgba('+p.r+','+p.g+','+p.b+','+p.alpha+')';ctx.fill();
  }
  drawText();doClick=false;requestAnimationFrame(loop);
}
canvas.addEventListener('mousemove',function(e){mouse.x=e.clientX;mouse.y=e.clientY;});
canvas.addEventListener('mouseleave',function(){mouse.x=-9999;mouse.y=-9999;});
canvas.addEventListener('click',function(e){clickX=e.clientX;clickY=e.clientY;doClick=true;});
canvas.addEventListener('touchmove',function(e){e.preventDefault();mouse.x=e.touches[0].clientX;mouse.y=e.touches[0].clientY;},{passive:false});
canvas.addEventListener('touchstart',function(e){clickX=e.touches[0].clientX;clickY=e.touches[0].clientY;doClick=true;});
window.addEventListener('resize',resize);
resize();loop();
})();</script>
</body></html>
